<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STAREX</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/responsive.css" />
  </head>
  <body>
    <section
      class="hero"
      style="
        background:
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.85) 0%,
            rgba(0, 0, 0, 0.4) 50%,
            rgba(0, 0, 0, 0) 100%
          ),
          url(&quot;/assets/images/home/banner.jpg&quot;);
      "
    >
      <header>
        <div class="container">
          <div class="header-wrapper">
            <div class="logo-wrapper">
              <a href="/index.html">
                <img
                  src="/assets/images/logo.png"
                  alt="STAREX Logo"
                  class="logo"
                />
              </a>
            </div>

            <div class="mobile-menu" id="mobileMenu">
              <div class="navbar-menu">
                <ul>
                  <li>
                    <a href="/assets/pages/about.html" class="active">О нас</a>
                  </li>
                  <li>
                    <a href="/assets/pages/services.html">Услуги</a>
                  </li>
                  <li>
                    <a href="/assets/pages/clients.html">Клиентам</a>
                  </li>
                  <li>
                    <a href="/assets/pages/vacancy.html">Вакансии</a>
                  </li>
                  <li>
                    <a href="/assets/pages/blog.html">Блог</a>
                  </li>
                  <li>
                    <a href="/assets/pages/contact.html">Контакты</a>
                  </li>
                </ul>
              </div>

              <div class="navbar-right-wrapper">
                <div class="navbar-phone-wrapper">
                  <span>пн-пт 10:00-19:00</span>
                  <a href="tel:+998711234561">+998 (71) 123-45-61</a>
                </div>

                <div class="navbar-right-btn-wrapper">
                  <button>Вызвать курьера</button>
                  <button>
                    <img src="/assets/images/user.svg" alt="icon" />
                    Кабинет
                  </button>
                </div>
              </div>

              <button class="mobile-close" aria-label="Close">
                <img src="./assets/images/close.svg" alt="image" />
              </button>
            </div>

            <button class="burger-btn" id="burgerBtn">
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
        </div>
      </header>

      <div class="container">
        <div class="hero-wrapper">
          <div class="hero-body">
            <h1>Быстрая и надежная доставка</h1>
            <p>По всему Узбекистану и миру</p>
            <span>
              Отправляйте, отслежимайте и управляйте своими посылками легко.
            </span>

            <div class="tab-wrapper">
              <div class="tab-group">
                <button class="tab active" data-tab="package">
                  <img src="/assets/images/search.svg" alt="icon" />
                  Отследить посылку
                </button>
                <button class="tab" data-tab="calc">
                  <img src="/assets/images/calc.svg" alt="icon" />
                  Калькулятор
                </button>
              </div>

              <div class="tab-content">
                <div class="tab-pane active" id="package">
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Введите трекинг номер"
                  />
                  <button>Наблюдать</button>
                </div>

                <div class="tab-pane" id="calc">
                  <p>Содержимое калькулятора</p>
                </div>
              </div>
            </div>
          </div>

          <div class="spinner-container">
            <div class="spinner-icon">
              <a href="#">
                <img src="/assets/images/home/telegram.svg" alt="icon" />
              </a>
            </div>
            <svg class="spinner-text" viewBox="0 0 200 200">
              <defs>
                <path
                  id="textCircle"
                  d="M 100,100 m -75,0 a 75,75 0 1,1 150,0 a 75,75 0 1,1 -150,0"
                />
              </defs>
              <text>
                <textPath href="#textCircle" startOffset="0%">
                  Оставить заявку - Оставить заявку -
                </textPath>
              </text>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <main>
      <section>
        <div class="container">restart</div>
      </section>
    </main>

    <footer></footer>

    <script src="/assets/js/main.js"></script>
  </body>
</html>
